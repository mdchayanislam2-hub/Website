<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও গ্যালারি</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .movie-card { background: white; margin-top: 20px; padding: 15px; border-radius: 10px; }
        video { width: 100%; }
    </style>
</head>
<body>

    <div class="box">
        <h3>অনলাইনে সেভ করুন</h3>
        <input type="text" id="title" placeholder="নাম লিখুন">
        <input type="text" id="url" placeholder="ভিডিওর লিঙ্ক দিন">
        <button onclick="saveMovie()">সেভ করুন</button>
    </div>

    <div id="gallery"></div>

    <script src="script.js"></script>
</body>
  </html>
